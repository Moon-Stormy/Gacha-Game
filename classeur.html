<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classeur</title>

    
<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#binder{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.cardBox{
    width:140px;
}

.cardBox img{
    width:140px;
    border-radius:10px;
}

.missing{
    filter:grayscale(100%) brightness(25%);
}

.common{border:2px solid gray;}
.rare{border:2px solid dodgerblue;}
.epic{border:2px solid purple;}
.legendary{border:2px solid gold;}

.common-name{
    color: lightgray;
}

.rare-name{
    color:#4da6ff;
    text-shadow:0 0 8px #4da6ff;
}

.epic-name{
    color:#c05cff;
    text-shadow:0 0 12px #c05cff;
}

.legendary-name{
    color:#FFD700;
    font-weight:bold;
    text-shadow:
        0 0 5px #FFD700,
        0 0 10px #FFD700,
        0 0 20px #FFEA70;
    animation:legendaryGlow 1.8s infinite alternate;
}

@keyframes legendaryGlow{

    0%{
        color:#d4af37;
        text-shadow:
            0 0 5px #d4af37,
            0 0 10px #d4af37;
    }

    50%{
        color:#fff5a0;
        text-shadow:
            0 0 10px #FFD700,
            0 0 20px #FFD700,
            0 0 35px #fff176;
    }

    100%{
        color:#FFD700;
        text-shadow:
            0 0 5px #FFD700,
            0 0 15px #FFD700,
            0 0 25px #fff176;
    }

}

</style>

</head>

<body>

<h1>📖 Classeur</h1>

<button onclick="location.href='index.html'">
Retour au Gacha
</button>

<div id="binder"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="cards.js?v=timestamp"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDqVDKeiJCu_CY2c7hothVjF7b_FhIQAfc",
  authDomain: "gacha-game-47592.firebaseapp.com",
  projectId: "gacha-game-47592",
  storageBucket: "gacha-game-47592.firebasestorage.app",
  messagingSenderId: "597224961825",
  appId: "1:597224961825:web:38efc44b194374a3443060",
  measurementId: "G-52PPGWQTY6"
}; 

firebase.initializeApp(firebaseConfig);
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const db=firebase.firestore();

firebase.auth().onAuthStateChanged(async user => {

    console.log(user);

    if (!user) {
        location.href = "index.html";
        return;
    }

    const doc = await db.collection("users").doc(user.uid).get();

    const inv = doc.data().inventory || [];

    const owned = inv.map(c => c.file);

    const binder = document.getElementById("binder");

    cards.forEach(card => {

        const div = document.createElement("div");
        div.className = "cardBox";

        const img = document.createElement("img");
        img.src = "cards/" + card.file;
        img.className = card.rarity;

        if (!owned.includes(card.file)) {
            img.classList.add("missing");
        }

        const txt = document.createElement("div");

        // Si la carte est possédée
        if (owned.includes(card.file)) {
            txt.innerText = card.name;
        } else {
            txt.innerText = "???";
        }

        // Couleur selon la rareté
        txt.classList.add(card.rarity + "-name");

        div.appendChild(img);
        div.appendChild(txt);

        binder.appendChild(div);

     });

}); 

</script>

</body>
</html>
