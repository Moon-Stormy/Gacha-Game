<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gacha Game</title>

<style>
#inventory div {
    cursor: pointer;
}
 
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.card {
    width: 200px;
    margin-top: 20px;
}

#inventory {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

#inventory > div {
    position: relative;
}

.inv-card {
    width: 100px;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid white;
    transition: transform 0.2s ease;
}

.inv-card:hover {
    transform: scale(2.2);
    z-index: 1000;
    position: relative;
}

.common { border: 2px solid gray; }
.rare { border: 2px solid blue; }
.epic { border: 2px solid purple; }
.legendary { border: 2px solid gold; }

.card {
    width: 200px;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.legendary-name {
    font-weight: bold;
    color: #FFD700;
    text-shadow:
        0 0 5px #FFD700,
        0 0 10px #FFD700,
        0 0 20px #FFEA70;
    animation: legendaryGlow 1.8s infinite alternate;
}

@keyframes legendaryGlow {
    0% {
        color: #d4af37;
        text-shadow:
            0 0 5px #d4af37,
            0 0 10px #d4af37;
    }

    50% {
        color: #fff5a0;
        text-shadow:
            0 0 10px #FFD700,
            0 0 20px #FFD700,
            0 0 35px #fff176;
    }

    100% {
        color: #FFD700;
        text-shadow:
            0 0 5px #FFD700,
            0 0 15px #FFD700,
            0 0 25px #fff176;
    }
}

.common-name { color: lightgray; }

.rare-name {
    color: #4da6ff;
    text-shadow: 0 0 8px #4da6ff;
}

.epic-name {
    color: #c05cff;
    text-shadow: 0 0 12px #c05cff;
}

</style>
</head>

<body>

<h1>🎴 Mon Gacha</h1>

<div id="auth">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <br>
    <button onclick="register()">Inscription</button>
    <button onclick="login()">Connexion</button>
</div>

<div id="game" style="display:none;">

    <h2 id="welcome"></h2>

    <button onclick="drawCard()">🎲 Tirer une carte</button>

    <p id="cooldown"></p>

    <img id="cardImg" class="card">
    <h3 id="cardName"></h3>
    <img id="rollImg" class="card" style="display:none;">

    <h3>🎯 Objectifs</h3>
    <ul id="objectives"></ul>
    <button onclick="window.location.href='classeur.html'">
    📖 Voir le classeur
    </button>
    <h3>📦 Inventaire</h3>
    <ul id="inventory"></ul>

    <button onclick="logout()">Logout</button>
</div>
<audio id="pullSound" src="sounds/pull.mp3" preload="auto"></audio>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="cards.js"></script>

<script>

const cardImg = document.getElementById("cardImg");
const cooldown = document.getElementById("cooldown");
const inventory = document.getElementById("inventory");
const objectives = document.getElementById("objectives");
const cardName = document.getElementById("cardName");
const rollImg = document.getElementById("rollImg");
const pullSound = document.getElementById("pullSound");

const firebaseConfig = {
  apiKey: "AIzaSyDqVDKeiJCu_CY2c7hothVjF7b_FhIQAfc",
  authDomain: "gacha-game-47592.firebaseapp.com",
  projectId: "gacha-game-47592",
  storageBucket: "gacha-game-47592.firebasestorage.app",
  messagingSenderId: "597224961825",
  appId: "1:597224961825:web:38efc44b194374a3443060",
  measurementId: "G-52PPGWQTY6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const objectivesList = [
    { id: "first_pull", text: "Faire 1 tirage" },
    { id: "collect_3", text: "Obtenir 3 cartes" },
    { id: "collect_10", text: "Obtenir 10 cartes" },
    { id: "get_epic", text: "Obtenir une carte épique" },
    { id: "get_legendary", text: "Obtenir une carte légendaire" }
];

let currentUser = null;

function register() {
    auth.createUserWithEmailAndPassword(email.value, password.value).catch(alert);
}

function login() {
    auth.signInWithEmailAndPassword(email.value, password.value).catch(alert);
}

function logout() {
    auth.signOut();
}

auth.onAuthStateChanged(async user => {

    const authDiv = document.getElementById("auth");
    const gameDiv = document.getElementById("game");

    if (user) {
        currentUser = user;

        authDiv.style.display = "none";
        gameDiv.style.display = "block";

        document.getElementById("welcome").innerText =
            "Bienvenue " + user.email;

        loadData();
    } else {
        currentUser = null;

        authDiv.style.display = "block";
        gameDiv.style.display = "none";
    }
});

async function loadData() {
    const ref = db.collection("users").doc(currentUser.uid);
    const doc = await ref.get();

    if (!doc.exists) {
        await ref.set({
            inventory: [],
            lastPull: 0,
            objectives: {}
        });
    }

    const data = doc.data() || {
        inventory: [],
        lastPull: 0,
        objectives: {}
    };

    renderInventory(data.inventory);
    renderObjectives(data.objectives);
    checkCooldown(data.lastPull);
}

// 🎲 RANDOM CARD
function getRandomCard() {

    const roll = Math.random() * 100;
    let pool;

    if (roll < 70) pool = cards.filter(c => c.rarity === "common");
    else if (roll < 90) pool = cards.filter(c => c.rarity === "rare");
    else if (roll < 98) pool = cards.filter(c => c.rarity === "epic");
    else pool = cards.filter(c => c.rarity === "legendary");

    if (!pool.length) pool = cards;

    return pool[Math.floor(Math.random() * pool.length)];
}

// Animation

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function playRollAnimation(finalCard) {

    cardImg.style.display = "none";
    rollImg.style.display = "block";
    cardName.innerText = "";

    const rollCount = 65;// 65 images 

    for (let i = 0; i < rollCount; i++) {
        const tempCard = cards[Math.floor(Math.random() * cards.length)];
        rollImg.src = "cards/" + tempCard.file;

        await sleep(100); // vitesse animation
    }

    rollImg.style.display = "none";
    cardImg.style.display = "block";

    cardImg.src = "cards/" + finalCard.file;
    cardName.innerText = finalCard.name;
}

// 🎴 DRAW
async function drawCard() {
    

    const ref = db.collection("users").doc(currentUser.uid);
    const doc = await ref.get();
    const data = doc.data();

    const now = Date.now();
    const cooldownTime = 15 * 60 * 1000; 

    if (now - data.lastPull < cooldownTime) {
        alert("⏳ Attends encore un peu !");
        return;
    }

    const card = getRandomCard();
    
    if (card.rarity === "legendary") {
    pullSound.src = "sounds/legendary.mp3";
    } else {
    pullSound.src = "sounds/pull.mp3";
    }
    pullSound.volume = 0.3;
    pullSound.currentTime = 0;
    pullSound.play();

    const entry = {
        file: card.file,
	name: card.name,
        rarity: card.rarity
    };

    data.inventory = data.inventory || [];
    data.inventory.push(entry);

    await ref.update({
        inventory: data.inventory,
        lastPull: now
    });

    await playRollAnimation(card);

    checkObjectives(data);
    renderInventory(data.inventory);
    checkCooldown(now);
}

// ⏳ COOLDOWN 15 * 60 * 1000

function checkCooldown(lastPull) {

    const cooldownTime = 0;
    const now = Date.now();
    const diff = cooldownTime - (now - lastPull);

    if (diff > 0) {

        const min = Math.floor(diff / 60000);
        const sec = Math.floor((diff % 60000) / 1000);

        cooldown.innerText =
            `⏳ Prochain tirage dans ${min} min ${sec}s`;

    } else {

        cooldown.innerText = "✅ Tirage disponible";

    }
}

// 📦 INVENTAIRE (RARITY FIX)
function renderInventory(inv) {

    inventory.innerHTML = "";

    inv.forEach(item => {

        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.alignItems = "center";
        wrapper.style.width = "100px";

        const img = document.createElement("img");
        img.src = "cards/" + item.file;
        img.className = "inv-card " + item.rarity;

        const name = document.createElement("div");
        name.innerText = item.name || item.file.replace(".png", "");
        name.style.fontSize = "12px";
        name.style.marginTop = "5px";
        name.style.textAlign = "center";
	name.classList.add(item.rarity + "-name");

        wrapper.appendChild(img);
        wrapper.appendChild(name);

        inventory.appendChild(wrapper);
    });
}
// 🎯 OBJECTIFS
async function renderObjectives(obj) {

    objectives.innerHTML = "";

    objectivesList.forEach(o => {

        const li = document.createElement("li");

        li.innerText = obj[o.id]
            ? "✅ " + o.text
            : "❌ " + o.text;

        objectives.appendChild(li);
    });
}

// 🎯 CHECK OBJECTIVES
async function checkObjectives(data) {

    const ref = db.collection("users").doc(currentUser.uid);

    let obj = data.objectives || {};

    // 🎯 1 tirage
    if (!obj.first_pull) obj.first_pull = true;

	// 📦 3 cartes
	if (data.inventory.length >= 3) {
    	obj.collect_3 = true;
	}

    // 📦 10 cartes
    if (data.inventory.length >= 10) {
        obj.collect_10 = true;
    }

    // 💜 épique
    const hasEpic = data.inventory.some(item => item.rarity === "epic");
    if (hasEpic) {
        obj.get_epic = true;
    }

    // 💛 légendaire
    const hasLegendary = data.inventory.some(item => item.rarity === "legendary");
    if (hasLegendary) {
        obj.get_legendary = true;
    }

    await ref.update({ objectives: obj });

    renderObjectives(obj);
}

setInterval(async () => {

    if (!currentUser) return;

    const doc = await db.collection("users")
        .doc(currentUser.uid)
        .get();

    checkCooldown(doc.data().lastPull);

}, 1000);


</script>

</body>
</html>
