<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gacha Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.card {
    width: 200px;
    margin-top: 20px;
}

#inventory {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.inv-card {
    width: 100px;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid white;
    transition: transform 0.2s;
}

.inv-card:hover {
    transform: scale(1.1);
}

.common {
    border: 2px solid gray;
}

.rare {
    border: 2px solid blue;
}

.epic {
    border: 2px solid purple;
}

.legendary {
    border: 2px solid gold;
}

</style>
</head>

<body>

<h1>🎴 Mon Gacha</h1>

<div id="auth">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <br>
    <button onclick="register()">Inscription</button>
    <button onclick="login()">Connexion</button>
</div>

<div id="game" style="display:none;">

    <h2 id="welcome"></h2>

    <button onclick="drawCard()">🎲 Tirer une carte</button>

    <p id="cooldown"></p>

    <img id="cardImg" class="card">

    <h3>🎯 Objectifs</h3>
    <ul id="objectives"></ul>

    <h3>📦 Inventaire</h3>
    <ul id="inventory"></ul>

    <button onclick="logout()">Logout</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const cardImg = document.getElementById("cardImg");
const cooldown = document.getElementById("cooldown");
const inventory = document.getElementById("inventory");
const objectives = document.getElementById("objectives");

// 🔥 CONFIG FIREBASE (REMPLACE ICI)

const firebaseConfig = {
  apiKey: "AIzaSyDqVDKeiJCu_CY2c7hothVjF7b_FhIQAfc",
  authDomain: "gacha-game-47592.firebaseapp.com",
  projectId: "gacha-game-47592",
  storageBucket: "gacha-game-47592.firebasestorage.app",
  messagingSenderId: "597224961825",
  appId: "1:597224961825:web:38efc44b194374a3443060",
  measurementId: "G-52PPGWQTY6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🎴 CARTES (tu mets tes images dans /cards)
const cards = [
    { name: "Dragon", file: "dragon.png", rarity: "legendary" }
];

// 🎯 OBJECTIFS MODIFIABLES FACILEMENT
const objectivesList = [
    { id: "first_pull", text: "Faire 1 tirage" },
    { id: "collect_3", text: "Obtenir 3 cartes" }
];

let currentUser = null;

// 🔐 REGISTER
function register() {
    auth.createUserWithEmailAndPassword(
        email.value,
        password.value
    ).catch(alert);
}

// 🔐 LOGIN
function login() {
    auth.signInWithEmailAndPassword(
        email.value,
        password.value
    ).catch(alert);
}

// 🔐 LOGOUT
function logout() {
    auth.signOut();
}

// 👤 USER STATE
auth.onAuthStateChanged(async user => {

    const authDiv = document.getElementById("auth");
    const gameDiv = document.getElementById("game");

    if (!authDiv || !gameDiv) return;

    if (user) {
        currentUser = user;

        authDiv.style.display = "none";
        gameDiv.style.display = "block";

        document.getElementById("welcome").innerText =
            "Bienvenue " + user.email;

        loadData();
    } else {
        currentUser = null;

        authDiv.style.display = "block";
        gameDiv.style.display = "none";
    }
});

// 💾 LOAD DATA
async function loadData() {
    const ref = db.collection("users").doc(currentUser.uid);
    const doc = await ref.get();

    if (!doc.exists) {
        await ref.set({
            inventory: [],
            lastPull: 0,
            objectives: {}
        });
    }

    const data = doc.data() || {
        inventory: [],
        lastPull: 0,
        objectives: {}
    };

    renderInventory(data.inventory);
    renderObjectives(data.objectives);
    checkCooldown(data.lastPull);
}
// 🎲 DRAW CARD

function getRarityClass(file) {
    const card = cards.find(c => c.file === file);
    if (!card) return "";

    return card.rarity;
}

function getRandomCard() {
    const roll = Math.random() * 100;

    let pool = [];

    if (roll < 70) {
        pool = cards.filter(c => c.rarity === "common");
    } 
    else if (roll < 90) {
        pool = cards.filter(c => c.rarity === "rare");
    } 
    else if (roll < 98) {
        pool = cards.filter(c => c.rarity === "epic");
    } 
    else {
        pool = cards.filter(c => c.rarity === "legendary");
    }

    // 🔥 FIX IMPORTANT
    if (pool.length === 0) {
        pool = cards;
    }

    return pool[Math.floor(Math.random() * pool.length)];
}

async function drawCard() {
    const ref = db.collection("users").doc(currentUser.uid);
    const doc = await ref.get();
    const data = doc.data();

    const now = Date.now();
    const cooldown = 2 * 60 * 60 * 1000;

    if (now - data.lastPull < cooldown) {
        alert("⏳ Attends encore un peu !");
        return;
    }

    const card = getRandomCard();

    data.inventory = data.inventory || [];
    data.inventory.push(card.file);

    await ref.update({
        inventory: data.inventory,
        lastPull: now
    });

    if (cardImg) {
        cardImg.src = "cards/" + card;
    }

    checkObjectives(data);
    renderInventory(data.inventory);
    checkCooldown(now);
}

// ⏳ COOLDOWN DISPLAY
function checkCooldown(lastPull) {
    const now = Date.now();
    const diff = 2 * 60 * 60 * 1000 - (now - lastPull);

    if (diff > 0) {
        const min = Math.floor(diff / 60000);
        cooldown.innerText = "⏳ Prochain tirage dans " + min + " min";
    } else {
        cooldown.innerText = "✅ Tirage disponible";
    }
}

// 📦 INVENTAIRE
function renderInventory(inv) {
    inventory.innerHTML = "";

    inv.forEach(c => {
        const img = document.createElement("img");

        const path = "cards/" + c;

        img.src = path;
        img.className = "inv-card " + getRarityClass(c);

        img.onerror = () => {
            console.log("Image introuvable :", path);
            img.src = "https://via.placeholder.com/100x140?text=Missing";
        };

        inventory.appendChild(img);
    });
}
// 🎯 OBJECTIFS
async function renderObjectives(obj) {
    objectives.innerHTML = "";

    objectivesList.forEach(o => {
        let li = document.createElement("li");

        if (obj[o.id]) {
            li.innerText = "✅ " + o.text;
        } else {
            li.innerText = "❌ " + o.text;
        }

        objectives.appendChild(li);
    });
}

// 🎯 CHECK OBJECTIVES
async function checkObjectives(data) {
    const ref = db.collection("users").doc(currentUser.uid);

    let obj = data.objectives || {};

    if (!obj.first_pull) obj.first_pull = true;

    if (data.inventory.length >= 3) {
        obj.collect_3 = true;
    }

    await ref.update({
        objectives: obj
    });

    renderObjectives(obj);
}


</script>

</body>
</html>
